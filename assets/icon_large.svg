<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Smart Topic Rename icon large">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93C5FD"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B2A6A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- chat bubble -->
  <g filter="url(#shadow)">
    <rect x="36" y="48" width="184" height="120" rx="32" fill="url(#g)"/>
    <path d="M96 168 L68 212 L132 178" fill="url(#g)"/>
    <rect x="36" y="48" width="184" height="120" rx="32" fill="none" stroke="#1E3A8A" stroke-width="6" opacity="0.45"/>
  </g>

  <!-- topic tag -->
  <g transform="translate(148 58) rotate(14 44 44)">
    <path d="M26 28 h62 l22 22 v58 a14 14 0 0 1-14 14 H26 a14 14 0 0 1-14-14 V42 a14 14 0 0 1 14-14z" fill="#EFF6FF"/>
    <circle cx="40" cy="52" r="7" fill="#2563EB"/>
    <path d="M58 74 h40" stroke="#2563EB" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <path d="M58 94 h30" stroke="#2563EB" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- sparkles / rename magic -->
  <path d="M72 76 l6 16 16 6-16 6-6 16-6-16-16-6 16-6z" fill="#FBBF24"/>
  <path d="M208 144 l4 10 10 4-10 4-4 10-4-10-10-4 10-4z" fill="#FBBF24"/>
  <path d="M188 90 l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#FDE68A"/>

  <!-- lines inside bubble hinting "recap" -->
  <path d="M70 110 h96" stroke="#DBEAFE" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M70 134 h120" stroke="#DBEAFE" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M70 158 h84" stroke="#DBEAFE" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
</svg>
